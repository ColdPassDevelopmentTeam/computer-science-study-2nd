name: 📝 오타·문서 오류
description: 오탈자, 깨진 링크 또는 잘못된 문서 내용을 알려주세요.
title: "[문서 오류] 요약"
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: 대상 문서
      description: 파일 경로 또는 링크를 적어주세요.
      placeholder: "예: plan-1/curriculum/week-10.md"
    validations:
      required: true
  - type: textarea
    id: detail
    attributes:
      label: 잘못된 부분
      description: 현재 내용과 수정되어야 할 내용을 간단히 적어주세요.
      placeholder: "예: week-05.md의 '컴파일러'가 '컴파이러'로 적혀 있습니다."
    validations:
      required: true
