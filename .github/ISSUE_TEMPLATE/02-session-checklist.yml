name: ✅ 세션 운영 체크리스트
description: 세션의 주제와 일정, 후속 확인 사항을 기록합니다.
title: "[세션] 주제 — 날짜"
labels: ["session"]
body:
  - type: input
    id: session-info
    attributes:
      label: 주차 / 주제 / 일시
      placeholder: "예: CS 3주차 / 데이터베이스 / 7월 20일(일) 14:00"
    validations:
      required: true
  - type: input
    id: facilitator
    attributes:
      label: 이번 주 진행자 (1~2명)
      description: 시간과 토론 흐름을 함께 관리할 진행자 한 명 또는 두 명을 적어주세요.
      placeholder: "예: 홍길동 / 김개발"
    validations:
      required: true
  - type: checkboxes
    id: notice
    attributes:
      label: 세션 전 확인
      options:
        - label: 세션 주제와 일정을 공지함
        - label: 필수·선택·제외 범위를 공지함
  - type: textarea
    id: links
    attributes:
      label: Discussion / 참고 자료 (선택)
      description: 미리 공유할 질문, 토론 또는 참고 자료가 있으면 링크를 남겨주세요.
      placeholder: "https://github.com/ColdPassDevelopmentTeam/computer-science-study-2nd/discussions/..."
  - type: textarea
    id: unresolved
    attributes:
      label: 미해결 내용과 후속 확인 (선택)
      description: 세션에서 해결하지 못한 내용과 다시 확인할 사항을 기록해주세요.
  - type: input
    id: next-session
    attributes:
      label: 다음 세션 일시 (선택)
      placeholder: "예: 7월 27일(일) 14:00"
  - type: input
    id: next-facilitator
    attributes:
      label: 다음 주 진행자 (1~2명)
      description: 이슈를 만들 때 정해지지 않았다면 세션 종료 후 입력해주세요.
      placeholder: "예: 김개발 / 이스터디"
