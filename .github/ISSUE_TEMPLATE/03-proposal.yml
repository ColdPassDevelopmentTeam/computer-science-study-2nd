name: 💡 운영 개선 제안
description: 스터디 진행 방식, 커리큘럼, 규칙에 대한 개선 아이디어를 제안합니다.
title: "[제안] 요약"
labels: ["proposal"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 현재 상황 / 불편한 점
      placeholder: "예: 한 세션에서 다루는 주제가 많아 충분히 논의하기 어렵습니다."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      placeholder: "예: 핵심 주제를 줄이고 남은 내용은 참고 범위로 옮기는 건 어떨까요?"
    validations:
      required: true
  - type: dropdown
    id: decision
    attributes:
      label: 결정 방식
      description: 이 제안을 어떻게 결정하면 좋을까요?
      options:
        - 다음 세션 클로징 때 5분 논의
        - Discussion 투표(Poll)로 결정
        - 운영자 재량으로 바로 반영 가능
    validations:
      required: true
