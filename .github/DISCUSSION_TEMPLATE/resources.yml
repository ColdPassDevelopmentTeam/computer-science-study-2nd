title: "[자료] 제목"
body:
  - type: input
    id: link
    attributes:
      label: 링크
      placeholder: "https://..."
    validations:
      required: true
  - type: input
    id: topic
    attributes:
      label: 관련 주차 / 주제
      placeholder: "예: Week 5 — 인덱스 (또는 '공통')"
  - type: textarea
    id: why
    attributes:
      label: 왜 공유하는지 한 줄
      placeholder: "예: B+Tree 시각화가 잘 되어 있어서 인덱스 이해에 좋아요."
    validations:
      required: true
